<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offres d'emploi – Sarthe Tourisme</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --c-black:     #111111;
    --c-yellow:    #fbc02d;
    --c-yellow-lt: #FEF6DC;
    --c-white:     #FFFFFF;
    --c-bg:        #F5F5F5;
    --c-text:      #111111;
    --c-muted:     #666666;
    --c-border:    #E0E0E0;
    --c-cdi-bg:    #E2F0E8; --c-cdi-tx: #1A6336;
    --c-cdd-bg:    #FFF3E0; --c-cdd-tx: #7A4200;
    --c-mis-bg:    #EDE9FB; --c-mis-tx: #3D2D8A;
    --c-lib-bg:    #FDE9E5; --c-lib-tx: #8A2A1A;
    --radius: 6px; --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--c-bg); color: var(--c-text); font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--c-black); padding: 1.25rem 2rem 1rem; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--c-yellow); }
  .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; pointer-events: none; color: rgba(255,255,255,0.4); }
  .header input[type=text] { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); padding: 8px 10px 8px 34px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #fff; outline: none; transition: border 0.15s; }
  .header input::placeholder { color: rgba(255,255,255,0.35); }
  .header input:focus { border-color: var(--c-yellow); }
  .header select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); padding: 8px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #fff; outline: none; cursor: pointer; }
  .header select option { background: #1E1E1E; color: #fff; }
  .count-info { font-size: 12px; color: rgba(255,255,255,0.55); white-space: nowrap; align-self: center; padding: 0 4px; }
  .count-info strong { color: var(--c-yellow); font-weight: 600; }
  .chips-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip { padding: 3px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); font-size: 11.5px; cursor: pointer; background: transparent; color: rgba(255,255,255,0.6); font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .chip:hover { border-color: rgba(255,255,255,0.45); color: #fff; }
  .chip.on { background: var(--c-yellow); border-color: var(--c-yellow); color: #111; font-weight: 500; }

  /* DESKTOP LAYOUT */
  .layout { display: flex; }
  .pane-list { width: 390px; flex-shrink: 0; background: var(--c-white); border-right: 1px solid var(--c-border); overflow-y: auto; height: calc(100vh - 115px); position: sticky; top: 115px; }
  .no-result { padding: 3rem 1.5rem; text-align: center; color: var(--c-muted); font-size: 13px; line-height: 1.8; }

  /* OFFER CARD */
  .ocard { padding: 14px 16px; border-bottom: 1px solid var(--c-border); cursor: pointer; transition: background 0.12s; }
  .ocard:hover { background: var(--c-yellow-lt); }
  .ocard.sel { background: var(--c-yellow-lt); border-left: 3px solid var(--c-yellow); }
  .ocard-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .ocard-title { font-family: 'Syne', sans-serif; font-size: 13.5px; font-weight: 700; color: var(--c-black); line-height: 1.35; flex: 1; }
  .badge { padding: 2px 8px; border-radius: 3px; font-size: 10.5px; font-weight: 600; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.03em; }
  .b-CDI { background: var(--c-cdi-bg); color: var(--c-cdi-tx); }
  .b-CDD { background: var(--c-cdd-bg); color: var(--c-cdd-tx); }
  .b-MIS { background: var(--c-mis-bg); color: var(--c-mis-tx); }
  .b-LIB { background: var(--c-lib-bg); color: var(--c-lib-tx); }
  .ocard-co { font-size: 12px; color: #444; font-weight: 500; margin-bottom: 5px; }
  .ocard-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11.5px; color: var(--c-muted); }
  .ocard-date { font-size: 10.5px; color: var(--c-muted); margin-top: 5px; }
  .new-dot { color: #b8860b; font-weight: 600; font-size: 10.5px; margin-left: 5px; }

  /* DESKTOP DETAIL PANEL */
  .pane-detail { flex: 1; overflow-y: auto; height: calc(100vh - 115px); background: var(--c-bg); }
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--c-muted); text-align: center; padding: 2rem; gap: 10px; }
  .placeholder svg { opacity: 0.2; }
  .placeholder p { font-size: 13px; }
  .detail { display: none; }
  .detail.show { display: block; }

  /* MOBILE OVERLAY */
  .mobile-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: var(--c-bg);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mobile-overlay.open { display: block; }

  /* SHARED DETAIL STYLES */
  .dhead { background: var(--c-black); padding: 2rem; border-bottom: 3px solid var(--c-yellow); }
  .back-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.5); cursor: pointer; border: none; background: none; padding: 0; font-family: 'DM Sans', sans-serif; margin-bottom: 14px; transition: color 0.12s; }
  .back-btn:hover { color: var(--c-yellow); }
  .dhead h2 { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 5px; }
  .dhead-co { font-size: 13px; color: var(--c-yellow); font-weight: 500; margin-bottom: 12px; }
  .dhead-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .dtag { padding: 3px 10px; border-radius: 3px; font-size: 11.5px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; gap: 5px; }
  .dbody { padding: 1.5rem 2rem; max-width: 750px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .icard { background: var(--c-white); border: 1px solid var(--c-border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .icard-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--c-muted); font-weight: 500; margin-bottom: 4px; }
  .icard-val { font-size: 13px; font-weight: 500; color: var(--c-text); line-height: 1.3; }
  .icard-val.sal { font-weight: 600; }
  .sec-lbl { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--c-black); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid var(--c-yellow); display: inline-block; }
  .desc-box { background: var(--c-white); border: 1px solid var(--c-border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 13px; line-height: 1.75; color: var(--c-text); white-space: pre-line; margin-bottom: 1.5rem; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1.5rem; }
  .tag { padding: 4px 12px; border-radius: 3px; font-size: 12px; background: #F5F5F5; color: #333; border: 1px solid var(--c-border); }
  .tag.q { background: var(--c-cdi-bg); color: var(--c-cdi-tx); border-color: #B8DDCA; }
  .apply-bar { background: var(--c-black); border-radius: var(--radius-sm); padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .apply-bar p { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .apply-bar strong { color: #fff; font-size: 14px; font-family: 'Syne', sans-serif; }
  .btn-apply { background: var(--c-yellow); color: #111; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; transition: background 0.15s; }
  .btn-apply:hover { background: #e6ad28; }
  .ref-line { font-size: 10.5px; color: var(--c-muted); text-align: right; padding-bottom: 1rem; }

  /* RESPONSIVE */
  @media (max-width: 860px) {
    .pane-list { width: 300px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 640px) {
    /* Sur mobile, on cache le panneau desktop et on utilise l'overlay */
    .layout { display: block; }
    .pane-list { width: 100%; height: auto; position: static; border-right: none; }
    .pane-detail { display: none; } /* remplacé par l'overlay */
    .header { padding: 1rem; }
    .dhead { padding: 1.25rem; }
    .dbody { padding: 1.25rem; }
    .info-grid { grid-template-columns: 1fr 1fr; }
    /* Flèche retour mobile plus visible */
    .back-btn { font-size: 13.5px; color: rgba(255,255,255,0.7); padding: 4px 0; }
  }
</style>
</head>

let fil = [...DATA], cat = 'all', selId = null;

const isMobile = () => window.innerWidth <= 640;
const fmtD = iso => iso ? new Date(iso).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'}) : '';
const isNew = iso => iso && (Date.now() - new Date(iso)) < 7*86400000;
const bCls = t => {
  if (!t) return 'b-CDD';
  const u = t.toUpperCase();
  if (u.includes('CDI')) return 'b-CDI';
  if (u.includes('MIS')||u.includes('INTERIM')||u.includes('INTÉRIM')) return 'b-MIS';
  if (u.includes('LIB')) return 'b-LIB';
  return 'b-CDD';
};
const short = (s,n) => s && s.length > n ? s.slice(0,n-1)+'…' : s||'';

function run() {
  const q = document.getElementById('sQ').value.toLowerCase().trim();
  const c = document.getElementById('sC').value;
  const d = document.getElementById('sD').value;
  fil = DATA.filter(o => {
    const txt = [o.intitule,o.entreprise,o.lieu,o.secteur,o.description,o.rome].join(' ').toLowerCase();
    if (q && !txt.includes(q)) return false;
    const tc = (o.typeContrat||'').toUpperCase();
    if (c==='CDI' && !tc.includes('CDI')) return false;
    if (c==='CDD' && !tc.includes('CDD')) return false;
    if (c==='MIS' && !tc.includes('MIS') && !tc.includes('INTERIM') && !tc.includes('INTÉRIM')) return false;
    if (c==='LIB' && !tc.includes('LIB')) return false;
    if (d && o.duree !== d) return false;
    const sec=(o.secteur||'').toLowerCase(), rom=(o.rome||'').toLowerCase();
    if (cat==='resto' && !sec.includes('restaurat') && !sec.includes('boisson') && !sec.includes('traiteur')) return false;
    if (cat==='hotel' && !sec.includes('hôtel') && !sec.includes('hotel') && !sec.includes('hébergement') && !sec.includes('hebergement')) return false;
    if (cat==='sport' && !sec.includes('sport') && !rom.includes('sport') && !rom.includes('éducateur')) return false;
    if (cat==='alt' && !o.alternance) return false;
    return true;
  });
  document.getElementById('cnt').textContent = fil.length;
  render();
}

function render() {
  const el = document.getElementById('listBody');
  if (!fil.length) { el.innerHTML = '<div class="no-result">Aucune offre ne correspond<br>à vos critères de recherche.</div>'; return; }
  el.innerHTML = fil.map(o => {
    const bc = bCls(o.typeContrat);
    const n = isNew(o.dateCreation) ? '<span class="new-dot">● Nouveau</span>' : '';
    const loc = o.lieu.replace(/^72 - /i,'');
    return `<div class="ocard${selId===o.id?' sel':''}" onclick="pick('${o.id}')">
      <div class="ocard-top">
        <div class="ocard-title">${o.intitule}</div>
        <span class="badge ${bc}">${short(o.typeContrat,18)}</span>
      </div>
      <div class="ocard-co">${o.entreprise||'Entreprise non précisée'}</div>
      <div class="ocard-meta">
        <span>📍 ${loc}</span>
        ${o.salaire?`<span>💶 ${short(o.salaire,28)}</span>`:''}
        ${o.experience?`<span>🎓 ${o.experience}</span>`:''}
      </div>
      <div class="ocard-date">Publié le ${fmtD(o.dateCreation)}${n}</div>
    </div>`;
  }).join('');
}

function buildDetailHTML(o, mobile) {
  const bc = bCls(o.typeContrat);
  const loc = o.lieu.replace(/^72 - /i,'');
  const backFn = mobile ? 'closeMobile()' : 'back()';
  const skills = o.competences.length
    ? `<div style="margin-bottom:1.5rem"><div class="sec-lbl">Compétences</div><div style="height:8px"></div><div class="tags-wrap">${o.competences.map(c=>`<span class="tag">${c}</span>`).join('')}</div></div>` : '';
  const quals = o.qualites.length
    ? `<div style="margin-bottom:1.5rem"><div class="sec-lbl">Qualités professionnelles</div><div style="height:8px"></div><div class="tags-wrap">${o.qualites.map(q=>`<span class="tag q">${q}</span>`).join('')}</div></div>` : '';
  const horaires = o.horaires.filter(h=>h.trim()).length
    ? `<div style="margin-bottom:1.5rem"><div class="sec-lbl">Horaires</div><div style="height:8px"></div><div class="tags-wrap">${o.horaires.filter(h=>h.trim()).map(h=>`<span class="tag">${h.trim()}</span>`).join('')}</div></div>` : '';
  return `
    <div class="dhead">
      <button class="back-btn" onclick="${backFn}">&#8592; Retour à la liste</button>
      <h2>${o.intitule}</h2>
      <div class="dhead-co">${o.entreprise||'Entreprise non précisée'}</div>
      <div class="dhead-tags">
        <span class="dtag">📍 ${loc}</span>
        <span class="dtag badge ${bc}" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.8)">${o.typeContrat||'N/A'}</span>
        ${o.duree?`<span class="dtag">⏱ ${o.duree}</span>`:''}
        ${o.alternance?'<span class="dtag">🎓 Alternance</span>':''}
        ${o.accTH?'<span class="dtag">♿ Accessible TH</span>':''}
      </div>
    </div>
    <div class="dbody">
      <div class="info-grid">
        ${o.salaire?`<div class="icard"><div class="icard-lbl">Rémunération</div><div class="icard-val sal">${o.salaire}</div></div>`:''}
        <div class="icard"><div class="icard-lbl">Expérience</div><div class="icard-val">${o.experience||'Non précisée'}</div></div>
        <div class="icard"><div class="icard-lbl">Contrat</div><div class="icard-val">${o.typeContrat||'N/A'}</div></div>
        <div class="icard"><div class="icard-lbl">Durée</div><div class="icard-val">${o.duree||'N/A'}</div></div>
        <div class="icard"><div class="icard-lbl">Postes</div><div class="icard-val">${o.nombrePostes}</div></div>
        <div class="icard"><div class="icard-lbl">Secteur</div><div class="icard-val">${o.secteur||'N/A'}</div></div>
      </div>
      <div style="margin-bottom:1.5rem">
        <div class="sec-lbl">Description du poste</div>
        <div style="height:8px"></div>
        <div class="desc-box">${o.description}</div>
      </div>
      ${skills}${quals}${horaires}
      ${o.url?`<div class="apply-bar"><div><strong>Postuler à cette offre</strong><p>Candidature via France Travail</p></div><a href="${o.url}" target="_blank" class="btn-apply">Voir l'offre &#8594;</a></div>`:''}
      <div class="ref-line">Réf. ${o.id} · Publié le ${fmtD(o.dateCreation)} · Mis à jour le ${fmtD(o.dateActualisation)}</div>
    </div>`;
}

function pick(id) {
  selId = id;
  const o = DATA.find(x => x.id === id);
  if (!o) return;
  document.querySelectorAll('.ocard').forEach(c => c.classList.toggle('sel', c.getAttribute('onclick')=== `pick('${id}')`));

  if (isMobile()) {
    const overlay = document.getElementById('mobileOverlay');
    document.getElementById('mobileDetail').innerHTML = buildDetailHTML(o, true);
    overlay.classList.add('open');
    overlay.scrollTop = 0;
    document.body.style.overflow = 'hidden';
  } else {
    document.getElementById('ph').style.display = 'none';
    const det = document.getElementById('det');
    det.classList.add('show');
    det.innerHTML = buildDetailHTML(o, false);
    document.getElementById('detailPane').scrollTop = 0;
  }
}

function back() {
  selId = null;
  document.getElementById('ph').style.display = '';
  document.getElementById('det').classList.remove('show');
  document.getElementById('det').innerHTML = '';
  document.querySelectorAll('.ocard').forEach(c => c.classList.remove('sel'));
}

function closeMobile() {
  document.getElementById('mobileOverlay').classList.remove('open');
  document.body.style.overflow = '';
  selId = null;
  document.querySelectorAll('.ocard').forEach(c => c.classList.remove('sel'));
}

// Fermer l'overlay avec le bouton retour navigateur sur mobile
window.addEventListener('popstate', () => {
  if (document.getElementById('mobileOverlay').classList.contains('open')) closeMobile();
});

document.querySelectorAll('.chip').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); cat = b.dataset.f; run();
  });
});
document.getElementById('sQ').addEventListener('input', run);
document.getElementById('sC').addEventListener('change', run);
document.getElementById('sD').addEventListener('change', run);

run();
</script>
